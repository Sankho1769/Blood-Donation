<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RaktaMitra — Find Help</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red2:#E74C3C;--red3:#FF6B6B;
  --bg:#F5F0EB;--bg2:#EDE8E1;--sur:#FFFFFF;--card:#FAF7F4;--card2:#F0EBE4;
  --bdr:#E2DAD0;--bdr2:#CFC5B8;
  --txt:#1C1410;--txt2:#6B5D50;--txt3:#A8998A;
  --blue:#1D4ED8;--blue2:#3B82F6;--blue-bg:rgba(29,78,216,0.07);--blue-bdr:rgba(29,78,216,0.18);
  --shd:rgba(28,20,16,0.10);
  --tog-track:#E2DAD0;--tog-knob:#fff;
}
[data-theme="dark"]{
  --bg:#0D0B09;--bg2:#141210;--sur:#1A1714;--card:#201D1A;--card2:#272320;
  --bdr:#2E2925;--bdr2:#3D3830;
  --txt:#F0EBE4;--txt2:#9A8B7C;--txt3:#5A4E44;
  --blue:#60A5FA;--blue2:#93C5FD;--blue-bg:rgba(96,165,250,0.08);--blue-bdr:rgba(96,165,250,0.2);
  --shd:rgba(0,0,0,0.55);
  --tog-track:#2E2925;--tog-knob:#F0EBE4;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#1a1a1a}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;transition:background 0.45s,color 0.45s}

.frame{width:100%;max-width:430px;min-height:100vh;position:relative;background:var(--bg);
  transition:background 0.45s;overflow:hidden}

.grain{pointer-events:none;position:fixed;inset:0;z-index:99;opacity:0.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px}

.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;transition:opacity 0.5s,background 0.5s}
.orb1{width:380px;height:380px;background:radial-gradient(circle,rgba(192,57,43,0.14),transparent 70%);top:-100px;right:-80px}
.orb2{width:260px;height:260px;background:radial-gradient(circle,rgba(192,57,43,0.08),transparent 70%);bottom:120px;left:-60px}
[data-theme="dark"] .orb1{background:radial-gradient(circle,rgba(192,57,43,0.22),transparent 70%)}
[data-theme="dark"] .orb2{background:radial-gradient(circle,rgba(192,57,43,0.12),transparent 70%)}

header{
  position:sticky;top:0;z-index:50;
  padding:14px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(245,240,235,0.88);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--bdr);transition:background 0.45s,border-color 0.45s;
}
[data-theme="dark"] header{background:rgba(13,11,9,0.88)}

.logo-row{display:flex;align-items:center;gap:9px}
.logo-drop{
  width:34px;height:34px;background:linear-gradient(135deg,var(--red),var(--red3));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 14px rgba(192,57,43,0.45);
  animation:logoPulse 2.8s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{box-shadow:0 4px 14px rgba(192,57,43,0.45)}50%{box-shadow:0 4px 26px rgba(192,57,43,0.8),0 0 36px rgba(231,76,60,0.2)}}
.logo-text{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--txt);transition:color 0.45s}
.logo-text b{color:var(--red3)}

.tog-wrap{display:flex;align-items:center;gap:8px}
.tog-label{font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:0.5px;transition:color 0.45s}
.tog{
  width:50px;height:27px;border-radius:30px;
  background:var(--tog-track);border:1px solid var(--bdr2);
  cursor:pointer;position:relative;transition:background 0.4s,border-color 0.4s;flex-shrink:0;
}
[data-theme="dark"] .tog{background:#3D3830}
.tok{
  position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;
  background:var(--tog-knob);display:flex;align-items:center;justify-content:center;font-size:12px;
  transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1),background 0.4s;
  box-shadow:0 2px 8px rgba(0,0,0,0.18);
}
[data-theme="dark"] .tok{transform:translateX(23px)}

.hero{padding:28px 20px 20px;position:relative;z-index:1}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--red2);margin-bottom:10px;
}
.hero-eyebrow-line{width:22px;height:2px;background:var(--red2);border-radius:2px;animation:lineGrow 0.9s ease both}
@keyframes lineGrow{from{width:0}to{width:22px}}
.hero-title{
  font-family:'Playfair Display',serif;font-size:30px;font-weight:900;
  color:var(--txt);line-height:1.12;margin-bottom:8px;
  animation:dropIn 0.65s cubic-bezier(0.22,1,0.36,1) both;transition:color 0.45s;
}
.hero-title em{color:var(--red3);font-style:italic}
@keyframes dropIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
.hero-sub{font-size:13px;color:var(--txt2);line-height:1.6;animation:fadeUp 0.65s 0.1s both;transition:color 0.45s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.mode-toggle-bar{
  margin:0 20px 26px;padding:6px;
  background:var(--card2);border:1px solid var(--bdr);border-radius:20px;
  display:flex;gap:0;position:relative;z-index:1;
  animation:fadeUp 0.65s 0.15s both;
}
.mode-tab{
  flex:1;padding:12px 8px;border-radius:14px;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.3s;text-align:center;position:relative;z-index:1;
  color:var(--txt2);letter-spacing:0.3px;
}
.mode-tab.active-emrg{
  background:linear-gradient(135deg,var(--red),var(--red3));color:#fff;
  box-shadow:0 6px 20px rgba(192,57,43,0.38);transform:scale(1.02);
}
.mode-tab.active-norm{
  background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;
  box-shadow:0 6px 20px rgba(29,78,216,0.32);transform:scale(1.02);
}
.mode-tab:not(.active-emrg):not(.active-norm):hover{color:var(--txt);background:var(--sur)}

.warn-pill{
  margin:0 20px 20px;padding:10px 14px;
  border-radius:12px;font-size:12px;font-weight:500;line-height:1.5;
  animation:fadeUp 0.5s 0.2s both;transition:all 0.35s;
}
.warn-pill.emrg-warn{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);color:var(--red2)}
.warn-pill.norm-warn{background:var(--blue-bg);border:1px solid var(--blue-bdr);color:var(--blue)}
[data-theme="dark"] .warn-pill.emrg-warn{color:var(--red3)}

.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 14px;position:relative;z-index:1;
}
.sh-left h3{font-size:15px;font-weight:700;color:var(--txt);transition:color 0.45s}
.sh-left p{font-size:11px;color:var(--txt2);margin-top:2px;transition:color 0.45s}
.sh-badge{
  font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:0.5px;
}
.sh-badge.emrg{background:rgba(192,57,43,0.1);color:var(--red2);border:1px solid rgba(192,57,43,0.2)}
.sh-badge.norm{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}

.content-area{padding-bottom:32px;position:relative;z-index:1}

.donor-card{
  background:var(--sur);border:1px solid var(--bdr);border-radius:20px;
  padding:15px;margin:0 16px 12px;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
  animation:cardSlide 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
.donor-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(180deg,var(--red),var(--red3));
  border-radius:20px 0 0 20px;transition:width 0.28s;
}
.donor-card:hover{transform:translateX(5px) translateY(-1px);border-color:var(--bdr2);box-shadow:0 10px 36px var(--shd)}
.donor-card:hover::before{width:3px}
.donor-card:active{transform:scale(0.97)}

.dc-top{display:flex;align-items:flex-start;gap:13px}
.av-wrap{position:relative;flex-shrink:0}
.av{
  width:50px;height:50px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;
  font-family:'Playfair Display',serif;transition:transform 0.3s;
}
.donor-card:hover .av{transform:scale(1.1) rotate(-4deg)}
.av-bg{position:absolute;inset:0;border-radius:16px;opacity:0.2;transition:opacity 0.3s}
.donor-card:hover .av-bg{opacity:0.35}
.av-blood{
  position:absolute;bottom:-4px;right:-4px;
  font-size:8px;font-weight:800;color:#fff;
  padding:2px 6px;border-radius:6px;border:2px solid var(--sur);
  background:linear-gradient(135deg,var(--red),var(--red3));transition:border-color 0.45s;white-space:nowrap;
}
.online-ring{
  position:absolute;top:-2px;left:-2px;width:12px;height:12px;
  background:#22c55e;border-radius:50%;border:2px solid var(--sur);
  animation:onlinePulse 2s ease-in-out infinite;transition:border-color 0.45s;
}
@keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}60%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

.dc-info{flex:1;min-width:0}
.dc-name{font-size:15px;font-weight:700;color:var(--txt);transition:color 0.45s}
.dc-loc{font-size:11px;color:var(--txt2);margin-top:3px;transition:color 0.45s}
.dc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:7px;border:1px solid;letter-spacing:0.3px}
.tag-r{background:rgba(192,57,43,0.07);color:var(--red2);border-color:rgba(192,57,43,0.18)}
.tag-g{background:rgba(34,197,94,0.07);color:#16a34a;border-color:rgba(34,197,94,0.18)}
[data-theme="dark"] .tag-g{color:#4ade80;background:rgba(34,197,94,0.09);border-color:rgba(34,197,94,0.22)}
.tag-y{background:rgba(202,138,4,0.07);color:#b45309;border-color:rgba(202,138,4,0.18)}
[data-theme="dark"] .tag-y{color:#facc15;background:rgba(234,179,8,0.09);border-color:rgba(234,179,8,0.22)}

.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.blood-pill{
  font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;
  padding:5px 12px;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--red3));
  box-shadow:0 4px 12px rgba(192,57,43,0.32);transition:transform 0.25s;
}
.donor-card:hover .blood-pill{transform:scale(1.08)}
.dist-txt{font-size:10px;font-weight:600;color:var(--txt3);transition:color 0.45s}

.dc-bottom{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:13px;padding-top:12px;border-top:1px solid var(--bdr);transition:border-color 0.45s;
}
.dc-stats{display:flex;gap:18px}
.stat{text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--txt);transition:color 0.45s}
.stat-l{font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:0.6px;margin-top:1px;transition:color 0.45s}

.call-btn{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--red),var(--red3));
  color:#fff;border:none;border-radius:12px;padding:9px 16px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.25s;box-shadow:0 4px 14px rgba(192,57,43,0.3);
}
.call-btn:hover{transform:scale(1.06);box-shadow:0 6px 22px rgba(192,57,43,0.48)}
.call-btn:active{transform:scale(0.91)}
.ph-ico{font-size:14px;animation:ringSh 3s ease-in-out infinite}
@keyframes ringSh{0%,86%,100%{transform:rotate(0)}89%{transform:rotate(-14deg)}92%{transform:rotate(14deg)}95%{transform:rotate(-7deg)}}

.bank-card{
  background:var(--sur);border:1px solid var(--bdr);border-radius:20px;
  padding:15px;margin:0 16px 12px;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
  animation:cardSlide 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.bank-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(180deg,#1D4ED8,#3B82F6);
  border-radius:20px 0 0 20px;transition:width 0.28s;
}
.bank-card:hover{transform:translateX(5px) translateY(-1px);border-color:var(--bdr2);box-shadow:0 10px 36px var(--shd)}
.bank-card:hover::before{width:3px}
.bank-card:active{transform:scale(0.97)}

.bc-top{display:flex;align-items:flex-start;gap:13px}
.bc-icon{
  width:50px;height:50px;border-radius:16px;
  background:var(--blue-bg);border:1px solid var(--blue-bdr);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  transition:transform 0.3s,background 0.45s,border-color 0.45s;
}
.bank-card:hover .bc-icon{transform:scale(1.1) rotate(-4deg)}
.bc-info{flex:1;min-width:0}
.bc-name{font-size:13px;font-weight:700;color:var(--txt);line-height:1.35;transition:color 0.45s}
.bc-addr{font-size:11px;color:var(--txt2);margin-top:3px;line-height:1.4;transition:color 0.45s}
.bc-dist{font-size:11px;font-weight:700;color:var(--blue);margin-top:4px;transition:color 0.45s}
.bc-status{
  font-size:9px;font-weight:800;padding:2px 8px;border-radius:7px;
  display:inline-block;margin-top:5px;letter-spacing:0.5px;
}
.open{background:rgba(34,197,94,0.09);color:#16a34a;border:1px solid rgba(34,197,94,0.2)}
.closed{background:rgba(192,57,43,0.08);color:var(--red2);border:1px solid rgba(192,57,43,0.2)}
[data-theme="dark"] .open{color:#4ade80;background:rgba(34,197,94,0.1)}

.bc-bottom{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;padding-top:11px;border-top:1px solid var(--bdr);transition:border-color 0.45s;
}
.bc-phone{font-size:12px;font-weight:600;color:var(--txt2);display:flex;align-items:center;gap:5px;transition:color 0.45s}
.bank-call-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--blue-bg);color:var(--blue);
  border:1px solid var(--blue-bdr);border-radius:11px;padding:8px 14px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.25s;
}
.bank-call-btn:hover{background:rgba(29,78,216,0.14);transform:scale(1.06)}
.bank-call-btn:active{transform:scale(0.91)}

.loc-bar{padding:0 16px 16px;position:relative;z-index:1;animation:fadeUp 0.5s 0.2s both}
.loc-wrap{
  display:flex;align-items:center;gap:9px;
  background:var(--sur);border:1.5px solid var(--bdr);border-radius:14px;
  padding:11px 14px;transition:border 0.25s,background 0.45s;
}
.loc-wrap:focus-within{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.loc-ico{font-size:17px;opacity:0.5}
.loc-inp{
  flex:1;background:none;border:none;outline:none;
  font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;
  color:var(--txt);transition:color 0.45s;
}
.loc-inp::placeholder{color:var(--txt3)}
.srch-btn{
  background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;border:none;
  border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.22s;white-space:nowrap;
  box-shadow:0 3px 12px rgba(29,78,216,0.28);
}
.srch-btn:hover{box-shadow:0 5px 18px rgba(29,78,216,0.42);transform:scale(1.04)}
.srch-btn:active{transform:scale(0.92)}

.no-result{text-align:center;padding:52px 20px;animation:fadeUp 0.4s both}
.no-ico{font-size:52px;display:block;margin-bottom:14px;animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.no-t{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--txt);margin-bottom:6px;transition:color 0.45s}
.no-s{font-size:13px;color:var(--txt2);transition:color 0.45s}

.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  color:#fff;padding:11px 22px;border-radius:14px;
  font-size:13px;font-weight:700;z-index:9999;opacity:0;
  transition:all 0.38s cubic-bezier(0.22,1,0.36,1);white-space:nowrap;
  font-family:'DM Sans',sans-serif;pointer-events:none;
}
.toast.emrg-toast{background:linear-gradient(135deg,var(--red),var(--red3));box-shadow:0 8px 28px rgba(192,57,43,0.45)}
.toast.norm-toast{background:linear-gradient(135deg,#1D4ED8,#3B82F6);box-shadow:0 8px 28px rgba(29,78,216,0.38)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.panel{display:none}.panel.active{display:block}
.panel-enter{animation:panelIn 0.42s cubic-bezier(0.22,1,0.36,1) both}
@keyframes panelIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="frame">

<header>
  <div class="logo-row">
    <div class="logo-drop">🩸</div>
    <div class="logo-text">Rakta<b>Mitra</b></div>
  </div>
  <div class="tog-wrap">
    <span class="tog-label" id="togLbl">☀ Day</span>
    <div class="tog" onclick="toggleTheme()">
      <div class="tok" id="tok">☀️</div>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow"><span class="hero-eyebrow-line"></span>Blood Assistance</div>
  <div class="hero-title">Find help,<br><em>right now.</em></div>
  <div class="hero-sub">Choose your situation below — we'll connect you with the right support instantly.</div>
</div>

<div class="mode-toggle-bar">
  <div class="mode-tab" id="tabEmrg" onclick="setMode('emergency')">🚨 Emergency</div>
  <div class="mode-tab" id="tabNorm" onclick="setMode('normal')">🏥 Normal</div>
</div>

<div class="warn-pill" id="warnPill"></div>

<div id="panelEmrg" class="panel">
  <div class="section-head">
    <div class="sh-left">
      <h3>Volunteer Donors</h3>
      <p>10 contacts available now</p>
    </div>
    <span class="sh-badge emrg">🔴 LIVE</span>
  </div>
  <div class="content-area" id="donorList"></div>
</div>

<div id="panelNorm" class="panel">
  <div class="loc-bar">
    <div class="loc-wrap">
      <span class="loc-ico">📍</span>
      <input class="loc-inp" id="locInp" type="text" placeholder="Search area, e.g. Salt Lake, Garia…">
      <button class="srch-btn" onclick="filterBanks()">Search</button>
    </div>
  </div>
  <div class="section-head">
    <div class="sh-left">
      <h3>Nearby Blood Banks</h3>
      <p id="bankCount">10 banks found in Kolkata</p>
    </div>
    <span class="sh-badge norm">🏥 Normal</span>
  </div>
  <div class="content-area" id="bankList"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
var donors=[

var currentMode='';

function ini(n){return n.substring(0,2).toUpperCase()}

function setMode(mode){
  currentMode=mode;
  var tabE=document.getElementById('tabEmrg');
  var tabN=document.getElementById('tabNorm');
  var pE=document.getElementById('panelEmrg');
  var pN=document.getElementById('panelNorm');
  var warn=document.getElementById('warnPill');

  tabE.className='mode-tab';tabN.className='mode-tab';
  pE.className='panel';pN.className='panel';

  if(mode==='emergency'){
    tabE.classList.add('active-emrg');
    pE.classList.add('active','panel-enter');
    warn.className='warn-pill emrg-warn';
    warn.innerHTML='⚠️ Emergency mode directly contacts registered volunteer donors. Please use only for genuine medical emergencies.';
    renderDonors();
  } else {
    tabN.classList.add('active-norm');
    pN.classList.add('active','panel-enter');
    warn.className='warn-pill norm-warn';
    warn.innerHTML='🏥 Normal mode shows verified blood banks in and around Kolkata. Search by area to narrow results.';
    renderBanks(banks);
  }
}

function renderDonors(){
  var html=donors.map(function(d,i){
    return '<div class="donor-card" style="animation-delay:'+(i*0.055+0.02)+'s">'+
      '<div class="dc-top">'+
      '<div class="av-wrap">'+
        '<div class="av" style="background:'+d.color+'">'+ini(d.name)+'</div>'+
        '<div class="av-blood">'+d.blood+'</div>'+
        (d.online?'<div class="online-ring"></div>':'')+
      '</div>'+
      '<div class="dc-info">'+
        '<div class="dc-name">'+d.name+'</div>'+
        '<div class="dc-loc">📍 '+d.loc+'</div>'+
        '<div class="dc-tags">'+
          '<span class="tag tag-r">'+d.exp+' exp</span>'+
          '<span class="tag '+(d.online?'tag-g':'tag-y')+'">'+(d.online?'Online now':'Offline')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="dc-right">'+
        '<div class="blood-pill">'+d.blood+'</div>'+
        '<div class="dist-txt">'+d.dist+'</div>'+
      '</div></div>'+
      '<div class="dc-bottom">'+
        '<div class="dc-stats">'+
          '<div class="stat"><div class="stat-n">'+d.donations+'</div><div class="stat-l">DONATIONS</div></div>'+
          '<div class="stat"><div class="stat-n">'+d.exp+'</div><div class="stat-l">EXPERIENCE</div></div>'+
        '</div>'+
        '<button class="call-btn" onclick="callPerson(event,\''+d.phone+'\',\''+d.name+'\',\'emrg\')"><span class="ph-ico">📞</span> Call</button>'+
      '</div></div>';
  }).join('');
  document.getElementById('donorList').innerHTML=html;
}

function renderBanks(list){
  document.getElementById('bankCount').textContent=list.length+' bank'+(list.length!==1?'s':'')+' found in Kolkata';
  if(!list.length){
    document.getElementById('bankList').innerHTML='<div class="no-result"><span class="no-ico">🏥</span><div class="no-t">No banks found</div><div class="no-s">Try a broader area name</div></div>';
    return;
  }
  document.getElementById('bankList').innerHTML=list.map(function(b,i){
    return '<div class="bank-card" style="animation-delay:'+(i*0.055+0.02)+'s">'+
      '<div class="bc-top">'+
        '<div class="bc-icon">🏥</div>'+
        '<div class="bc-info">'+
          '<div class="bc-name">'+b.name+'</div>'+
          '<div class="bc-addr">'+b.addr+'</div>'+
          '<div class="bc-dist">📍 '+b.dist+' away</div>'+
          '<span class="bc-status '+(b.open?'open':'closed')+'">'+(b.open?'● Open Now':'● Closed')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="bc-bottom">'+
        '<div class="bc-phone">📞 '+b.phone+'</div>'+
        '<button class="bank-call-btn" onclick="callPerson(event,\''+b.phone.replace(/-/g,'')+'\',\''+b.name+'\',\'norm\')"><span class="ph-ico">📞</span> Call</button>'+
      '</div></div>';
  }).join('');
}

function filterBanks(){
  var q=document.getElementById('locInp').value.toLowerCase().trim();
  if(!q){renderBanks(banks);return}
  var filtered=banks.filter(function(b){
    return b.name.toLowerCase().includes(q)||b.addr.toLowerCase().includes(q)||b.area.toLowerCase().includes(q);
  });
  renderBanks(filtered);
}

document.getElementById('locInp').addEventListener('keydown',function(e){if(e.key==='Enter')filterBanks()});

function callPerson(e,phone,name,type){
  e.stopPropagation();
  var t=document.getElementById('toast');
  t.className='toast '+(type==='emrg'?'emrg-toast':'norm-toast');
  t.textContent='📞 Calling '+name+'…';
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){t.classList.remove('show')},2400);
  setTimeout(function(){window.location.href='tel:+91'+phone.replace(/[^0-9]/g,'')},700);
}

function toggleTheme(){
  var html=document.documentElement;
  var isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme',isLight?'dark':'light');
  document.getElementById('tok').textContent=isLight?'🌙':'☀️';
  document.getElementById('togLbl').textContent=isLight?'🌙 Night':'☀ Day';
}

setMode('emergency');
</script>
