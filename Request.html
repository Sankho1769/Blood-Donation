<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RaktaMitra — Find Donors</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--red:#C0392B;--red2:#E74C3C;--red3:#FF6B6B;
--bg:#0A0A0A;--bg2:#111;--surface:#181818;--card:#1E1E1E;--card2:#242424;
--border:#2A2A2A;--border2:#333;
--text:#F0EDE8;--text2:#A89F96;--text3:#665F58;
--shadow:rgba(0,0,0,0.6);
--tog-bg:#2A2A2A;--tog-knob:#F0EDE8;
}
[data-theme="light"]{
--bg:#F7F3EE;--bg2:#EDE9E3;--surface:#FFFFFF;--card:#F0EDE8;--card2:#E8E3DC;
--border:#DDD8D0;--border2:#C8C0B5;
--text:#1A1511;--text2:#6B5F54;--text3:#9E9088;
--shadow:rgba(0,0,0,0.12);
--tog-bg:#E0DBD4;--tog-knob:#1A1511;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);
min-height:100vh;overflow-x:hidden;transition:background 0.5s,color 0.5s;
}

::-webkit-scrollbar{width:0}

.grain{
pointer-events:none;position:fixed;inset:0;z-index:999;opacity:0.03;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
background-size:200px 200px;
}

.orb{
position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;
transition:opacity 0.6s;
}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(192,57,43,0.18),transparent 70%);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(192,57,43,0.1),transparent 70%);bottom:100px;left:-80px}

header{
position:sticky;top:0;z-index:100;
padding:16px 20px;
display:flex;align-items:center;justify-content:space-between;
background:rgba(10,10,10,0.85);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-bottom:1px solid var(--border);
transition:background 0.5s,border-color 0.5s;
}
[data-theme="light"] header{background:rgba(247,243,238,0.85)}

.back-btn{
width:38px;height:38px;border-radius:12px;border:1px solid var(--border2);
background:var(--card);display:flex;align-items:center;justify-content:center;
cursor:pointer;color:var(--text);font-size:18px;transition:all 0.2s;flex-shrink:0;
}
.back-btn:hover{background:var(--card2);border-color:var(--red);transform:scale(1.05)}
.back-btn:active{transform:scale(0.92)}

.header-center{flex:1;text-align:center}
.header-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text);transition:color 0.5s}
.header-sub{font-size:10px;color:var(--text2);margin-top:1px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.5s}

.theme-toggle{
width:52px;height:28px;border-radius:20px;background:var(--tog-bg);
border:1px solid var(--border2);cursor:pointer;position:relative;
transition:background 0.4s,border-color 0.4s;flex-shrink:0;
}
.theme-toggle:hover{border-color:var(--red)}
.tog-knob{
position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
background:var(--tog-knob);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),background 0.4s;
display:flex;align-items:center;justify-content:center;font-size:11px;
}
[data-theme="light"] .tog-knob{transform:translateX(24px)}

.hero{
padding:28px 20px 24px;position:relative;overflow:hidden;
}
.hero-label{
display:inline-flex;align-items:center;gap:6px;
font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
color:var(--red3);margin-bottom:10px;
}
.hero-label::before{content:'';width:20px;height:1.5px;background:var(--red3);display:block;animation:lineGrow 1s ease both}
@keyframes lineGrow{from{width:0}to{width:20px}}
.hero-title{
font-family:'Playfair Display',serif;font-size:32px;font-weight:900;
color:var(--text);line-height:1.1;margin-bottom:6px;
animation:titleDrop 0.7s cubic-bezier(0.22,1,0.36,1) both;transition:color 0.5s;
}
.hero-title em{color:var(--red3);font-style:italic}
@keyframes titleDrop{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
.hero-count{font-size:13px;color:var(--text2);animation:fadeUp 0.7s 0.1s both;transition:color 0.5s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.live-dot{display:inline-block;width:7px;height:7px;background:#22c55e;border-radius:50%;margin-right:5px;animation:livePulse 1.5s ease infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}60%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

.search-wrap{
padding:0 20px 20px;animation:fadeUp 0.6s 0.15s both;
}
.search-box{
display:flex;align-items:center;gap:10px;
background:var(--surface);border:1px solid var(--border);border-radius:16px;
padding:12px 16px;transition:all 0.3s;
}
.search-box:focus-within{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,0.12)}
.search-icon{font-size:17px;flex-shrink:0;opacity:0.5}
.search-input{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Syne',sans-serif;color:var(--text);font-weight:500;transition:color 0.5s}
.search-input::placeholder{color:var(--text3)}
.filter-btn{
width:34px;height:34px;border-radius:10px;border:1px solid var(--border2);
background:var(--card);display:flex;align-items:center;justify-content:center;
font-size:14px;cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.filter-btn:hover{background:rgba(192,57,43,0.1);border-color:var(--red)}
.filter-btn:active{transform:scale(0.88)}

.filter-chips{
display:flex;gap:8px;padding:0 20px 22px;overflow-x:auto;scrollbar-width:none;
animation:fadeUp 0.6s 0.2s both;
}
.filter-chips::-webkit-scrollbar{display:none}
.chip{
flex-shrink:0;padding:7px 14px;border-radius:30px;font-size:12px;font-weight:700;
cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);
transition:all 0.25s;letter-spacing:0.3px;
}
.chip:hover{border-color:var(--red);color:var(--red3);transform:translateY(-1px)}
.chip.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 16px rgba(192,57,43,0.4)}
.chip:active{transform:scale(0.93)}

.section-row{
display:flex;align-items:center;justify-content:space-between;
padding:0 20px 14px;animation:fadeUp 0.6s 0.25s both;
}
.sec-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.3px;transition:color 0.5s}
.sec-link{font-size:11px;color:var(--red3);font-weight:700;cursor:pointer;padding:4px 10px;border-radius:8px;transition:background 0.2s}
.sec-link:hover{background:rgba(192,57,43,0.1)}

.donors-grid{
display:flex;flex-direction:column;gap:0;padding:0 20px;
}

.donor-card{
background:var(--surface);border:1px solid var(--border);border-radius:20px;
padding:16px;margin-bottom:14px;cursor:pointer;transition:all 0.3s;
position:relative;overflow:hidden;
animation:cardSlide 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
.donor-card::before{
content:'';position:absolute;left:0;top:0;bottom:0;width:0;
background:linear-gradient(180deg,var(--red),var(--red3));
border-radius:20px 0 0 20px;transition:width 0.3s;
}
.donor-card:hover{transform:translateX(6px) translateY(-2px);border-color:var(--border2);box-shadow:0 12px 40px var(--shadow)}
.donor-card:hover::before{width:3px}
.donor-card:active{transform:scale(0.98)}

@keyframes cardSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
.donor-card:nth-child(1){animation-delay:0.05s}
.donor-card:nth-child(2){animation-delay:0.1s}
.donor-card:nth-child(3){animation-delay:0.15s}
.donor-card:nth-child(4){animation-delay:0.2s}
.donor-card:nth-child(5){animation-delay:0.25s}
.donor-card:nth-child(6){animation-delay:0.3s}
.donor-card:nth-child(7){animation-delay:0.35s}
.donor-card:nth-child(8){animation-delay:0.4s}
.donor-card:nth-child(9){animation-delay:0.45s}
.donor-card:nth-child(10){animation-delay:0.5s}

.dc-top{display:flex;align-items:flex-start;gap:13px}
.av-wrap{position:relative;flex-shrink:0}
.av{
width:52px;height:52px;border-radius:18px;display:flex;align-items:center;
justify-content:center;font-size:17px;font-weight:800;color:#fff;
font-family:'Playfair Display',serif;transition:transform 0.3s;
}
.donor-card:hover .av{transform:scale(1.08) rotate(-3deg)}
.av-badge{
position:absolute;bottom:-3px;right:-3px;width:18px;height:18px;
border-radius:6px;background:linear-gradient(135deg,var(--red),var(--red3));
border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;
font-size:8px;color:#fff;font-weight:800;transition:border-color 0.5s;
}
.online-ring{
position:absolute;top:-2px;right:-2px;width:12px;height:12px;
background:#22c55e;border-radius:50%;border:2px solid var(--surface);
animation:livePulse 2s ease infinite;transition:border-color 0.5s;
}

.dc-info{flex:1;min-width:0}
.dc-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;transition:color 0.5s}
.dc-loc{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;transition:color 0.5s}
.dc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:9px;font-weight:700;letter-spacing:0.5px;padding:3px 8px;border-radius:7px;border:1px solid}
.tag-exp{background:rgba(192,57,43,0.1);color:var(--red3);border-color:rgba(192,57,43,0.2)}
.tag-don{background:rgba(34,197,94,0.08);color:#4ade80;border-color:rgba(34,197,94,0.2)}
.tag-avail{background:rgba(234,179,8,0.08);color:#facc15;border-color:rgba(234,179,8,0.2)}
[data-theme="light"] .tag-don{color:#16a34a;border-color:rgba(22,163,74,0.2)}
[data-theme="light"] .tag-avail{color:#ca8a04;border-color:rgba(202,138,4,0.2)}

.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.blood-pill{
font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;
padding:5px 12px;border-radius:10px;
background:linear-gradient(135deg,var(--red),var(--red3));
box-shadow:0 4px 12px rgba(192,57,43,0.35);
transition:transform 0.2s;
}
.donor-card:hover .blood-pill{transform:scale(1.07)}
.dist-badge{font-size:10px;font-weight:600;color:var(--text2);transition:color 0.5s}

.dc-bottom{
display:flex;align-items:center;justify-content:space-between;
margin-top:13px;padding-top:12px;border-top:1px solid var(--border);
transition:border-color 0.5s;
}
.dc-stats{display:flex;gap:16px}
.stat-it{text-align:center}
.stat-n{font-size:15px;font-weight:800;color:var(--text);font-family:'Playfair Display',serif;transition:color 0.5s}
.stat-l{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:0.5px;margin-top:1px;transition:color 0.5s}

.call-btn{
display:flex;align-items:center;gap:6px;
background:linear-gradient(135deg,var(--red),var(--red3));
color:#fff;border:none;border-radius:12px;padding:9px 16px;
font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;
transition:all 0.25s;box-shadow:0 4px 16px rgba(192,57,43,0.3);
position:relative;overflow:hidden;
}
.call-btn::after{
content:'';position:absolute;inset:0;background:rgba(255,255,255,0);
transition:background 0.2s;
}
.call-btn:hover{transform:scale(1.05);box-shadow:0 6px 22px rgba(192,57,43,0.5)}
.call-btn:hover::after{background:rgba(255,255,255,0.1)}
.call-btn:active{transform:scale(0.93)}
.call-icon{font-size:14px;animation:ringShake 2.5s ease infinite}
@keyframes ringShake{
0%,90%,100%{transform:rotate(0)}
93%{transform:rotate(-12deg)}
96%{transform:rotate(12deg)}
99%{transform:rotate(-6deg)}
}

.empty-state{
padding:48px 20px;text-align:center;
animation:fadeUp 0.5s both;
}
.empty-icon{font-size:52px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;transition:color 0.5s}
.empty-sub{font-size:13px;color:var(--text2);transition:color 0.5s}

.toast{
position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
background:linear-gradient(135deg,var(--red),var(--red3));
color:#fff;padding:12px 22px;border-radius:14px;font-size:13px;font-weight:700;
font-family:'Syne',sans-serif;z-index:9999;opacity:0;
transition:all 0.4s cubic-bezier(0.22,1,0.36,1);white-space:nowrap;
box-shadow:0 8px 30px rgba(192,57,43,0.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.pb{height:28px}
</style>
</head>
<body>

<div class="grain"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
<div class="back-btn" onclick="history.back()">←</div>
<div class="header-center">
<div class="header-title">Find Donors</div>
<div class="header-sub"><span class="live-dot"></span>Live Network</div>
</div>
<div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
<div class="tog-knob" id="togKnob">
<span id="togIcon">🌙</span>
</div>
</div>
</header>

<div class="hero">
<div class="hero-label">Verified Donors</div>
<div class="hero-title">Find your <em>lifesaver</em><br>in seconds</div>
<div class="hero-count"><span class="live-dot"></span>248 donors active near Kolkata</div>
</div>

<div class="search-wrap">
<div class="search-box">
<span class="search-icon">🔍</span>
<input class="search-input" type="text" placeholder="Search by name, area…" id="searchInp" oninput="filterDonors()">
<div class="filter-btn" onclick="showToast('Filters coming soon!')">⚙</div>
</div>
</div>

<div class="filter-chips">
<div class="chip active" onclick="setFilter(this,'all')">All Types</div>
<div class="chip" onclick="setFilter(this,'O+')">O+</div>
<div class="chip" onclick="setFilter(this,'O-')">O−</div>
<div class="chip" onclick="setFilter(this,'A+')">A+</div>
<div class="chip" onclick="setFilter(this,'A-')">A−</div>
<div class="chip" onclick="setFilter(this,'B+')">B+</div>
<div class="chip" onclick="setFilter(this,'B-')">B−</div>
<div class="chip" onclick="setFilter(this,'AB+')">AB+</div>
<div class="chip" onclick="setFilter(this,'AB-')">AB−</div>
</div>

<div class="section-row">
<span class="sec-title" id="resultCount">10 donors found</span>
<span class="sec-link" onclick="showToast('Sorted by distance!')">Sort ↕</span>
</div>

<div class="donors-grid" id="donorsGrid"></div>

<div class="pb"></div>
<div class="toast" id="toast"></div>

<script>
var donors=[
{name:"Nandini",blood:"O+",loc:"Salt Lake, Sector V",dist:"0.6 km",exp:"3 yrs",donations:8,online:true,avail:"Available",color:"linear-gradient(135deg,#C0392B,#E74C3C)",phone:"9831234567"},
{name:"Laiba",blood:"A+",loc:"Park Street",dist:"1.2 km",exp:"2 yrs",donations:5,online:true,avail:"Available",color:"linear-gradient(135deg,#6C2B8E,#9B59B6)",phone:"9874563210"},
{name:"Sanjana",blood:"B+",loc:"Behala, Kolkata",dist:"2.1 km",exp:"4 yrs",donations:12,online:false,avail:"Tomorrow",color:"linear-gradient(135deg,#0E5C3B,#27AE60)",phone:"9123456780"},
{name:"Srinjay",blood:"AB+",loc:"Jadavpur, Kolkata",dist:"2.8 km",exp:"1 yr",donations:3,online:true,avail:"Available",color:"linear-gradient(135deg,#1A4A72,#2980B9)",phone:"7890123456"},
{name:"Ankita",blood:"O-",loc:"Dum Dum, Kolkata",dist:"3.4 km",exp:"5 yrs",donations:15,online:false,avail:"Available",color:"linear-gradient(135deg,#7D3200,#E67E22)",phone:"8765432109"},
{name:"Tridha",blood:"A-",loc:"Ballygunge, Kolkata",dist:"3.9 km",exp:"2 yrs",donations:6,online:true,avail:"Available",color:"linear-gradient(135deg,#5B2A82,#A569BD)",phone:"9632587410"},
{name:"Ria",blood:"B-",loc:"New Town, Action Area I",dist:"4.5 km",exp:"3 yrs",donations:9,online:true,avail:"Tomorrow",color:"linear-gradient(135deg,#1A5276,#1ABC9C)",phone:"7412369850"},
{name:"Sounak",blood:"O+",loc:"Kasba, Kolkata",dist:"5.1 km",exp:"6 yrs",donations:18,online:true,avail:"Available",color:"linear-gradient(135deg,#922B21,#E74C3C)",phone:"8523697410"},
{name:"Rimi",blood:"AB-",loc:"Tollygunge, Kolkata",dist:"5.8 km",exp:"1 yr",donations:2,online:false,avail:"Weekend",color:"linear-gradient(135deg,#1E3A5F,#2471A3)",phone:"9874123650"},
{name:"Barnali",blood:"A+",loc:"Shyambazar, Kolkata",dist:"6.3 km",exp:"4 yrs",donations:11,online:true,avail:"Available",color:"linear-gradient(135deg,#4A1942,#AF7AC5)",phone:"7896541230"}
];

var currentFilter="all";

function initials(n){return n.substring(0,2).toUpperCase()}

function renderDonors(list){
var g=document.getElementById('donorsGrid');
if(!list.length){
g.innerHTML='<div class="empty-state"><span class="empty-icon">🩸</span><div class="empty-title">No donors found</div><div class="empty-sub">Try a different blood group or area</div></div>';
document.getElementById('resultCount').textContent='0 donors found';
return;
}
document.getElementById('resultCount').textContent=list.length+' donor'+(list.length!==1?'s':'')+' found';
g.innerHTML=list.map(function(d,i){
var avColor=d.avail==='Available'?'tag-don':d.avail==='Tomorrow'?'tag-avail':'tag-exp';
return '<div class="donor-card" style="animation-delay:'+(i*0.05+0.05)+'s">'+
'<div class="dc-top">'+
'<div class="av-wrap">'+
'<div class="av" style="background:'+d.color+'">'+initials(d.name)+'</div>'+
'<div class="av-badge">'+d.blood.replace('+','＋').replace('-','−')+'</div>'+
(d.online?'<div class="online-ring"></div>':'')+
'</div>'+
'<div class="dc-info">'+
'<div class="dc-name">'+d.name+'</div>'+
'<div class="dc-loc">📍 '+d.loc+'</div>'+
'<div class="dc-tags">'+
'<span class="tag tag-exp">'+d.exp+' exp</span>'+
'<span class="tag '+avColor+'">'+d.avail+'</span>'+
(d.online?'<span class="tag tag-don">Online</span>':'')+
'</div>'+
'</div>'+
'<div class="dc-right">'+
'<div class="blood-pill">'+d.blood+'</div>'+
'<div class="dist-badge">'+d.dist+'</div>'+
'</div>'+
'</div>'+
'<div class="dc-bottom">'+
'<div class="dc-stats">'+
'<div class="stat-it"><div class="stat-n">'+d.donations+'</div><div class="stat-l">DONATIONS</div></div>'+
'<div class="stat-it"><div class="stat-n">'+d.exp+'</div><div class="stat-l">EXPERIENCE</div></div>'+
'</div>'+
'<button class="call-btn" onclick="callDonor(event,\''+d.phone+'\',\''+d.name+'\')"><span class="call-icon">📞</span> Call</button>'+
'</div>'+
'</div>';
}).join('');
}

function filterDonors(){
var q=document.getElementById('searchInp').value.toLowerCase();
var filtered=donors.filter(function(d){
var matchBlood=currentFilter==='all'||d.blood===currentFilter;
var matchSearch=!q||d.name.toLowerCase().includes(q)||d.loc.toLowerCase().includes(q)||d.blood.toLowerCase().includes(q);
return matchBlood&&matchSearch;
});
renderDonors(filtered);
}

function setFilter(el,val){
document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active')});
el.classList.add('active');
currentFilter=val;
filterDonors();
}

function callDonor(e,phone,name){
e.stopPropagation();
showToast('Calling '+name+'…');
setTimeout(function(){window.location.href='tel:+91'+phone},700);
}

function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show')},2400);
}

function toggleTheme(){
var html=document.documentElement;
var isDark=html.getAttribute('data-theme')==='dark';
html.setAttribute('data-theme',isDark?'light':'dark');
