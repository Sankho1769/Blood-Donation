<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaktaMitra - Blood Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --blood-dark: #0a0002;
            --blood-red: #c10015;
            --text-light: #fef2f2;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--blood-dark);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(5, 0, 1, 0.95) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .brand-container {
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            width: 100%;
            padding: 0 1.5rem;
            box-sizing: border-box;
        }

        .brand-text {
            font-size: clamp(2rem, 8vw, 5.5rem);
            font-weight: 800;
            letter-spacing: 0.05em;
            color: var(--text-light);
            margin: 0;
            text-shadow: 0 10px 30px rgba(193, 0, 21, 0.5);
            text-transform: uppercase;
            word-break: keep-all;
        }

        .subtitle {
            font-size: clamp(0.75rem, 2.5vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: #ffb3b8;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        .enter-btn {
            margin-top: 4rem;
            padding: 1rem 3.5rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: white;
            background: rgba(193, 0, 21, 0.1);
            border: 1px solid rgba(193, 0, 21, 0.6);
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(193, 0, 21, 0.2);
        }

        .enter-btn:hover {
            background: rgba(193, 0, 21, 0.3);
            border-color: #ff1a35;
            box-shadow: 0 0 30px rgba(193, 0, 21, 0.5), inset 0 0 15px rgba(193, 0, 21, 0.3);
            transform: translateY(-3px);
        }

        .icon-complex {
            width: 70px;
            height: 70px;
            margin-bottom: 1.5rem;
            opacity: 0;
        }

        .ring-outer {
            transform-origin: 50px 50px;
            animation: spinRight 12s linear infinite;
        }

        .center-drop {
            transform-origin: 50px 62px;
            animation: pulseDrop 1.2s ease-in-out infinite;
        }

        @keyframes spinRight {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseDrop {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(193, 0, 21, 0.5)); }
            15% { transform: scale(1.15); filter: drop-shadow(0 0 15px rgba(255, 26, 53, 0.8)); }
            30% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(193, 0, 21, 0.5)); }
            45% { transform: scale(1.15); filter: drop-shadow(0 0 15px rgba(255, 26, 53, 0.8)); }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>
    
    <div class="ui-layer">
        <div class="icon-complex">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <circle class="ring-outer" cx="50" cy="50" r="46" fill="none" stroke="rgba(255, 179, 184, 0.4)" stroke-width="2" stroke-dasharray="8 6" />
                <path class="center-drop" d="M50 32 C50 32, 36 52, 36 64 C36 71.7, 42.3 78, 50 78 C57.7 78, 64 71.7, 64 64 C64 52, 50 32, 50 32 Z" fill="#c10015" />
            </svg>
        </div>
        
        <div class="brand-container">
            <h1 class="brand-text">RaktaMitra</h1>
            <p class="subtitle">Blood Donor Network</p>
        </div>
        <button class="enter-btn" onclick="initiateEntry()">Connect</button>
    </div>

    <script>
        let scene, camera, renderer;
        let cells = [];
        let bloodFlowSpeed = 1;
        const clock = new THREE.Clock();
        
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        function init3D() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0002, 0.025);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x2a0005, 0.8));

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(0, 20, 10);
            scene.add(dirLight);

            const rimLight = new THREE.SpotLight(0xffffff, 4);
            rimLight.position.set(0, 0, -40);
            rimLight.lookAt(0, 0, 0);
            scene.add(rimLight);

            scene.add(new THREE.PointLight(0x8a0010, 5, 50));

            createBloodCells();

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('touchmove', onTouchMove, { passive: false });

            gsap.to(".icon-complex", { opacity: 1, y: 10, duration: 1.5, delay: 0.5, ease: "power2.out" });
            gsap.to(".brand-container", { opacity: 1, y: 0, duration: 1.5, delay: 0.8, ease: "power3.out" });
            gsap.to(".enter-btn", { opacity: 1, y: 0, duration: 1, delay: 1.5, ease: "back.out(1.5)" });
        }

        function createBloodCells() {
            const geometry = new THREE.SphereGeometry(1.2, 32, 32);
            const positions = geometry.attributes.position;
            
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                let z = positions.getZ(i);
                
                const dist = Math.sqrt(x*x + y*y);
                const thickness = 0.25 + 0.75 * Math.sin((dist / 1.2) * (Math.PI / 2));
                
                positions.setZ(i, z * 0.4 * thickness);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                color: 0x8a0314,
                roughness: 0.9,
                metalness: 0.1,
                flatShading: false
            });

            for (let i = 0; i < 150; i++) {
                const cell = new THREE.Mesh(geometry, material);
                
                resetCellPosition(cell);
                cell.position.z = (Math.random() - 0.5) * 80;

                cell.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

                cell.userData = {
                    rotSpeedX: (Math.random() - 0.5) * 0.02,
                    rotSpeedY: (Math.random() - 0.5) * 0.02,
                    rotSpeedZ: (Math.random() - 0.5) * 0.02,
                    driftX: (Math.random() - 0.5) * 0.05,
                    driftY: (Math.random() - 0.5) * 0.05,
                    baseScale: Math.random() * 0.5 + 0.7
                };
                
                cell.scale.setScalar(cell.userData.baseScale);
                cells.push(cell);
                scene.add(cell);
            }
        }

        function resetCellPosition(cell) {
            const radius = 25;
            const r = radius * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            
            cell.position.x = r * Math.cos(theta);
            cell.position.y = r * Math.sin(theta);
            cell.position.z = -40 - (Math.random() * 20);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) * 0.02;
            mouseY = (event.clientY - window.innerHeight / 2) * 0.02;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - window.innerWidth / 2) * 0.03;
                mouseY = (event.touches[0].clientY - window.innerHeight / 2) * 0.03;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            const beatTime = time * 1.5; 
            const pulse = Math.pow(Math.sin(beatTime * Math.PI), 16) * 0.3;

            const currentFlowSpeed = 0.15 + (pulse * 0.3) * bloodFlowSpeed;

            cells.forEach(cell => {
                cell.position.z += currentFlowSpeed;
                
                cell.position.x += cell.userData.driftX;
                cell.position.y += cell.userData.driftY;

                cell.rotation.x += cell.userData.rotSpeedX;
                cell.rotation.y += cell.userData.rotSpeedY;
                cell.rotation.z += cell.userData.rotSpeedZ;

                const dynamicScale = cell.userData.baseScale + (pulse * 0.1);
                cell.scale.setScalar(dynamicScale);

                if (cell.position.z > 15) {
                    resetCellPosition(cell);
                }
            });

            targetX = mouseX;
            targetY = mouseY;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function initiateEntry() {
            const btn = document.querySelector('.enter-btn');
            btn.style.pointerEvents = 'none';
            gsap.to(btn, { opacity: 0, y: 20, duration: 0.3 });
            gsap.to(".brand-container", { opacity: 0, y: -20, duration: 0.5, delay: 0.1 });
            gsap.to(".icon-complex", { opacity: 0, scale: 0.5, duration: 0.5 });

            bloodFlowSpeed = 8;

            gsap.to(camera.position, {
                z: -10,
                duration: 1.5,
                ease: "power2.in"
            });

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        window.onload = function() {
            init3D();
            animate();
        };
    </script>
</body>
</html>
