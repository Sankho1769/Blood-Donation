<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaktaMitra - Cinematic Medical Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #0055ff;
            --royal-light: #80aaff;
            --neon-white: #ffffff;
            --dark-bg: #00020a;
            --black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #050814 0%, var(--black) 100%);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .top-section {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .bottom-section {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drop-icon, .cross-icon {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: transparent;
            stroke-width: 2;
            opacity: 0;
            transform: scale(0) rotate(0deg);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .drop-icon {
            stroke: var(--royal-blue);
            filter: drop-shadow(0 0 5px var(--royal-blue));
        }
        
        .cross-icon {
            stroke: var(--neon-white);
            filter: drop-shadow(0 0 5px var(--neon-white));
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        .brand-text {
            position: relative;
            z-index: 101;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-align: center;
            background: linear-gradient(to right, #ffffff 0%, var(--royal-light) 50%, var(--royal-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
        }

        .subtitle {
            position: relative;
            z-index: 101;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #ffffff;
            text-align: center;
            line-height: 1.6;
            text-transform: uppercase;
            text-shadow: none;
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
        }

        .ui-state-reveal .drop-icon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
            fill: rgba(0, 85, 255, 0.1);
        }
        .ui-state-reveal .brand-text, .ui-state-reveal .subtitle {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .ui-state-morph1 .drop-icon {
            opacity: 0;
            transform: scale(0.2) rotate(180deg);
        }
        .ui-state-morph1 .cross-icon {
            opacity: 1;
            transform: scale(1) rotate(360deg);
            fill: rgba(255, 255, 255, 0.1);
        }
        .ui-state-morph1 .brand-text, .ui-state-morph1 .subtitle {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .ui-state-close .drop-icon, .ui-state-close .cross-icon {
            opacity: 0;
            transform: scale(0.2) rotate(-90deg);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .ui-state-close .brand-text, .ui-state-close .subtitle {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* 4. WELCOME STATE (Show branding and button) */
        .ui-state-welcome .brand-text, .ui-state-welcome .subtitle {
            opacity: 1;
            transform: scale(1) translateY(0);
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .ui-state-welcome .welcome-btn {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }
        .ui-state-welcome .drop-icon, .ui-state-welcome .cross-icon {
            opacity: 0;
            transform: scale(0.2) rotate(-90deg);
        }

        .welcome-btn {
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-white);
            background: rgba(0, 85, 255, 0.1);
            border: 2px solid var(--royal-blue);
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.4), inset 0 0 10px rgba(0, 85, 255, 0.2);
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        .welcome-btn:hover {
            background: var(--royal-blue);
            box-shadow: 0 0 25px rgba(0, 85, 255, 0.8), inset 0 0 15px rgba(0, 85, 255, 0.4);
            transform: scale(1.05) translateY(0);
            transition: all 0.3s ease;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-white)); }
            10% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon-white)); }
            20% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-white)); }
            30% { transform: scale(1.05); filter: drop-shadow(0 0 10px var(--neon-white)); }
            40% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-white)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-white)); }
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(0, 5, 20, 0.9);
            z-index: 5;
            pointer-events: none;
        }

        @media (min-width: 768px) {
            body { display: flex; justify-content: center; align-items: center; background-color: #000; }
            #app-container {
                position: relative; width: 400px; height: 711px;
                border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,85,255,0.2);
            }
        }
        @media (max-width: 767px) {
            #app-container { position: relative; width: 100%; height: 100%; }
            .brand-text { font-size: 3rem; }
            .subtitle { font-size: 0.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="canvas-container">
        <canvas id="ecgCanvas"></canvas>
    </div>
    <div class="vignette"></div>
    
    <div id="ui-layer">
        <div class="top-section">
            <div class="icon-container">
                <svg class="drop-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 21.5c-3.3 0-6-2.7-6-6 0-3.5 6-10.5 6-10.5s6 7 6 10.5c0 3.3-2.7 6-6 6z"/>
                </svg>
                <svg class="cross-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5v4H5v6h4v4h6v-4h4V9h-4V5H9z"/>
                </svg>
            </div>
            <h1 class="brand-text">RaktaMitra</h1>
            <p class="subtitle mt-4">Connecting Donors,<br>Saving Lives</p>
        </div>
        <div class="bottom-section">
            <button id="welcome-btn" class="welcome-btn" onclick="window.location.href='home.html'">Welcome</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('ecgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    let splitOffset = 0; 
    let targetSplitOffset = 0;
    
    let lineOpacity = 1;
    let targetLineOpacity = 1;

    let time = 0;
    const points = [];
    let maxPoints = 300; 
    
    let baseY = 0;

    function initECG() {
        if (points.length > 0) return; 

        const spacing = 4;
        maxPoints = Math.ceil(width / spacing) + 50; 
        
        for (let x = width; x >= -200; x -= spacing) {
            points.unshift({ x: x, yOffset: 0, isPeak: false });
        }
    }

    function resize() {
        const container = document.getElementById('canvas-container');
        width = container.clientWidth;
        height = container.clientHeight;
        canvas.width = width * window.devicePixelRatio;
        canvas.height = height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        
        // Responsive placement: Center on mobile (<=767px), lower on larger screens
        baseY = width <= 767 ? height * 0.5 : height * 0.65;
        initECG();
    }
    
    window.addEventListener('resize', resize);
    resize();

    const particles = [];
    for (let i = 0; i < 80; i++) {
        const isWhite = Math.random() > 0.5;
        particles.push({
            x: Math.random() * 1000,
            y: Math.random() * 1000,
            size: Math.random() * 2.5 + 0.5,
            speedY: -(Math.random() * 1 + 0.2),
            speedX: (Math.random() - 0.5) * 0.5,
            opacity: Math.random() * 0.5 + 0.1,
            color: isWhite 
                ? `rgba(255, 255, 255, ` 
                : `rgba(0, 85, 255, `,
            isWhite: isWhite
        });
    }

    const beatPattern = [
        [0, 0],       
        [10, -5],     
        [20, 0],
        [25, 0],      
        [30, 15],     
        [35, -120],
        [40, 30],     
        [45, 0],      
        [60, -15],    
        [75, 0],
        [100, 0]      
    ];

    let isBeating = false;
    let beatProgress = 0;
    let peakPointTagged = false;
    let animationStage = 0;
    
    // Start normal speed
    setTimeout(() => { animationStage = 1; }, 1500);

    function addECGPoint() {
        let x = width; 
        let yOffset = 0;
        let isCurrentPeak = false;

        for (let i = 0; i < points.length; i++) {
            points[i].x -= 4; 
        }

        if (isBeating) {
            let prevNode = beatPattern[0];
            let nextNode = beatPattern[beatPattern.length - 1];
            
            for (let i = 0; i < beatPattern.length - 1; i++) {
                if (beatProgress >= beatPattern[i][0] && beatProgress <= beatPattern[i+1][0]) {
                    prevNode = beatPattern[i];
                    nextNode = beatPattern[i+1];
                    break;
                }
            }

            const segmentProgress = (beatProgress - prevNode[0]) / (nextNode[0] - prevNode[0]);
            yOffset = prevNode[1] + (nextNode[1] - prevNode[1]) * segmentProgress;
            
            if (beatProgress >= 35 && !peakPointTagged) {
                isCurrentPeak = true;
                peakPointTagged = true;
            }

            yOffset *= (animationStage === 1 ? 2.2 : 1);
            beatProgress += 2.5;

            if (beatProgress >= beatPattern[beatPattern.length - 1][0]) {
                isBeating = false;
                beatProgress = 0;
            }
        } else {
            yOffset = Math.sin(time * 0.1) * 2;
            
            if ((animationStage === 0 || animationStage === 4 || animationStage === 5) && Math.random() < 0.01) {
                isBeating = true;
                peakPointTagged = false;
                beatProgress = 0;
            }
        }

        points.push({ x: x, yOffset: yOffset, isPeak: isCurrentPeak });

        if (points.length > maxPoints) points.shift();
    }

    const explosionParticles = [];
    function triggerReveal() {
        const uiLayer = document.getElementById('ui-layer');
        
        // 1. Reveal State (Lines fade out, Text + Drop show)
        uiLayer.className = 'ui-state-reveal';
        targetSplitOffset = height * 0.28; 
        targetLineOpacity = 0;
        animationStage = 2;
        
        for(let i=0; i<50; i++) {
            const isWhite = Math.random() > 0.5;
            explosionParticles.push({
                x: width/2,
                y: baseY, 
                vx: (Math.random() - 0.5) * 18,
                vy: (Math.random() - 0.5) * 18,
                life: 1.0,
                color: isWhite ? `hsl(0, 0%, ${60 + Math.random()*40}%)` : `hsl(220, 100%, ${50 + Math.random()*20}%)`
            });
        }

        // 2. Morph State (Drop becomes Cross)
        setTimeout(() => {
            uiLayer.className = 'ui-state-morph1';
            animationStage = 3;
        }, 2500);

        // 3. Close State (Cross hides, text stays, lines fade back in and merge)
        setTimeout(() => {
            uiLayer.className = 'ui-state-close';
            targetSplitOffset = 0;
            targetLineOpacity = 1;
            animationStage = 4;
        }, 5000);

        // 4. Welcome State (Lines are merged, show the button)
        setTimeout(() => {
            uiLayer.className = 'ui-state-welcome';
            animationStage = 5; 
        }, 6500);
    }

    function drawECG() {
        if (points.length < 2 || lineOpacity < 0.01) return;

        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = lineOpacity;
        
        const drawLine = (yShift, colorObj) => {
            const passes = [
                { width: 6, color: `rgba(${colorObj.rgb}, 0.5)`, blur: 5 },
                { width: 2, color: '#ffffff', blur: 0 }
            ];

            passes.forEach(pass => {
                ctx.beginPath();
                ctx.moveTo(points[0].x, baseY + yShift + points[0].yOffset);
                
                for (let i = 1; i < points.length; i++) {
                    const xc = (points[i].x + points[i-1].x) / 2;
                    const yc = baseY + yShift + (points[i].yOffset + points[i-1].yOffset) / 2;
                    ctx.quadraticCurveTo(points[i-1].x, baseY + yShift + points[i-1].yOffset, xc, yc);
                }
                ctx.lineTo(points[points.length-1].x, baseY + yShift + points[points.length-1].yOffset);

                ctx.lineWidth = pass.width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = pass.blur;
                ctx.shadowColor = pass.blur > 0 ? colorObj.hex : 'transparent';
                
                const gradient = ctx.createLinearGradient(0, 0, width, 0);
                gradient.addColorStop(0, 'rgba(255,255,255,0)');
                gradient.addColorStop(0.15, pass.color);
                gradient.addColorStop(1, pass.color);
                ctx.strokeStyle = gradient;

                ctx.stroke();
            });
        };

        if (splitOffset < 1) {
            drawLine(0, { rgb: '0, 85, 255', hex: '#0055ff' });
        } else {
            drawLine(-splitOffset, { rgb: '255, 255, 255', hex: '#ffffff' });
            drawLine(splitOffset, { rgb: '0, 85, 255', hex: '#0055ff' });
        }
        
        ctx.globalAlpha = 1.0;
        ctx.globalCompositeOperation = 'source-over';
    }

    function drawExplosion() {
        for(let i = explosionParticles.length - 1; i >= 0; i--) {
            let p = explosionParticles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02; 
            
            if(p.life <= 0) {
                explosionParticles.splice(i, 1);
                continue;
            }
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0, p.life * 5), 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        time++;

        splitOffset += (targetSplitOffset - splitOffset) * 0.05; 
        lineOpacity += (targetLineOpacity - lineOpacity) * 0.05; 

        if (animationStage === 1 && !isBeating && targetSplitOffset === 0) {
            isBeating = true;
            peakPointTagged = false;
            beatProgress = 0;
        }

        addECGPoint();

        const peakIndex = points.findIndex(p => p.isPeak);
        if (peakIndex !== -1) {
            if (points[peakIndex].x <= width / 2 && animationStage === 1) {
                points[peakIndex].isPeak = false;
                triggerReveal();
            } else if (points[peakIndex].x < -50) {
                points[peakIndex].isPeak = false; 
            }
        }

        particles.forEach(p => {
            p.y += p.speedY;
            p.x += p.speedX;
            if (p.y < -10) {
                p.y = height + 10;
                p.x = Math.random() * width;
            }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color + p.opacity + ')';
            ctx.fill();
        });

        drawECG();
        if(explosionParticles.length > 0) drawExplosion();

        requestAnimationFrame(animate);
    }

    animate();

</script>
</body>
</html>
