<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaktaMitra - Choose Action</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        brand: '#e11d48',
                        darkbg: '#0f172a',
                        darkcard: '#1e293b'
                    },
                    animation: {
                        'float-down': 'floatDown 2s ease-in-out infinite',
                        'float-up': 'floatUp 2s ease-in-out infinite',
                        'pulse-ring': 'pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        floatDown: {
                            '0%': { transform: 'translateY(-15px)', opacity: '0' },
                            '50%': { opacity: '1' },
                            '100%': { transform: 'translateY(15px)', opacity: '0' },
                        },
                        floatUp: {
                            '0%': { transform: 'translateY(15px)', opacity: '0' },
                            '50%': { opacity: '1' },
                            '100%': { transform: 'translateY(-15px)', opacity: '0' },
                        },
                        pulseRing: {
                            '0%': { transform: 'scale(0.8)', opacity: '0.8' },
                            '100%': { transform: 'scale(1.5)', opacity: '0' },
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(225, 29, 72, 0.5)' },
                            '50%': { boxShadow: '0 0 40px rgba(225, 29, 72, 0.8)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        * { transition: background-color 0.3s ease, border-color 0.3s ease; }

        .nav-diamond {
            position: relative;
            width: 4.5rem;
            height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .diamond-container {
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%);
            transform: rotate(45deg);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(225, 29, 72, 0.5), 0 8px 25px rgba(225, 29, 72, 0.25);
            border: 3px solid white;
            position: relative;
            animation: glow 2s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dark .diamond-container {
            border-color: #0f172a;
        }

        .diamond-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-radius: 0.5rem;
            animation: diamondPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes diamondPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }

        .diamond-icon {
            transform: rotate(-45deg);
            position: relative;
            z-index: 10;
            color: white;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .diamond-container:hover {
            transform: rotate(45deg) scale(1.1);
            box-shadow: 0 0 40px rgba(225, 29, 72, 0.7), 0 8px 35px rgba(225, 29, 72, 0.4);
        }

        .diamond-container:active {
            transform: rotate(45deg) scale(0.95);
        }

        .nav-item-active {
            color: #e11d48;
        }

        .nav-item-active span {
            color: #e11d48;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 flex items-center justify-center min-h-screen font-sans overflow-hidden">

    <div class="relative w-full max-w-[400px] h-[100dvh] bg-gray-50 dark:bg-darkbg flex flex-col overflow-hidden sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[8px] border-gray-900 dark:border-gray-800">
        
        <!-- Header with Logo & Name -->
        <header class="flex justify-between items-center px-6 py-4 z-40 border-b border-gray-100 dark:border-gray-800">
            <a href="home.html" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-brand to-rose-400 shadow-sm border border-rose-200 dark:border-rose-900/30 flex items-center justify-center text-white">
                    <i class="fa-solid fa-droplet text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-black text-gray-900 dark:text-white tracking-tight">RaktaMitra</h1>
                    <p class="text-[10px] font-semibold text-gray-400 dark:text-gray-500">Blood Donation</p>
                </div>
            </a>

            <div class="flex items-center gap-2">
                <button id="themeToggle" class="w-9 h-9 rounded-full bg-white dark:bg-darkcard shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400 hover:text-brand transition">
                    <i class="fa-solid fa-moon text-base" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col px-5 pb-24 pt-4 gap-4 overflow-y-auto">
            <div class="text-center mb-2">
                <h2 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">What do you need?</h2>
                <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mt-1">Choose an option to get started</p>
            </div>

            <!-- Give Blood Card -->
            <a href="donate.html" class="group flex-1 min-h-[180px] rounded-[2rem] bg-gradient-to-br from-rose-400 to-brand relative overflow-hidden flex flex-col items-center justify-center shadow-xl shadow-brand/30 transition-transform active:scale-95 border border-white/20 cursor-pointer hover:shadow-2xl hover:shadow-brand/40">
                <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
                
                <div class="relative z-10 flex flex-col items-center pointer-events-none">
                    <div class="relative flex items-center justify-center w-20 h-20 mb-3">
                        <div class="absolute inset-0 border-4 border-white/30 rounded-full animate-pulse-ring"></div>
                        <div class="absolute inset-0 bg-white/20 rounded-full"></div>
                        <div class="relative z-10 flex flex-col items-center text-white drop-shadow-md group-hover:scale-110 transition-transform duration-300">
                            <i class="fa-solid fa-arrow-up text-xl animate-float-up text-white/90"></i>
                            <i class="fa-solid fa-hand-holding-droplet text-4xl mt-0.5"></i>
                        </div>
                    </div>
                    
                    <h3 class="text-4xl leading-none font-black text-white tracking-tighter drop-shadow-md">GIVE</h3>
                    <p class="text-base font-bold text-white/90 drop-shadow-sm tracking-wide uppercase mt-1">BLOOD</p>
                    
                    <div class="mt-3 bg-white/20 backdrop-blur-sm border border-white/30 px-4 py-1.5 rounded-full flex items-center gap-2">
                        <i class="fa-solid fa-heart text-white text-xs animate-pulse"></i>
                        <span class="text-white text-xs font-bold uppercase tracking-wider">Donate Now</span>
                    </div>
                </div>
            </a>

            <div class="relative flex items-center justify-center w-full py-1">
                <div class="absolute w-full h-[1px] bg-gray-200 dark:bg-gray-800"></div>
                <span class="relative bg-gray-50 dark:bg-darkbg px-4 text-xs font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest">OR</span>
            </div>

            <!-- Need Blood Card -->
            <a href="Request.html" class="group flex-1 min-h-[180px] rounded-[2rem] bg-gradient-to-br from-blue-400 to-indigo-600 relative overflow-hidden flex flex-col items-center justify-center shadow-xl shadow-blue-500/30 transition-transform active:scale-95 border border-white/20 cursor-pointer hover:shadow-2xl hover:shadow-blue-500/40">
                <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                <div class="absolute -left-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
                
                <div class="relative z-10 flex flex-col items-center pointer-events-none">
                    <div class="relative flex items-center justify-center w-20 h-20 mb-3">
                        <div class="absolute inset-0 border-4 border-white/30 rounded-full animate-pulse-ring"></div>
                        <div class="absolute inset-0 bg-white/20 rounded-full"></div>
                        <div class="relative z-10 flex flex-col items-center text-white drop-shadow-md group-hover:scale-110 transition-transform duration-300">
                            <i class="fa-solid fa-arrow-down text-xl animate-float-down text-white/90" style="margin-top: -10px;"></i>
                            <i class="fa-solid fa-hands-holding text-4xl mt-0.5"></i>
                        </div>
                    </div>
                    
                    <h3 class="text-4xl leading-none font-black text-white tracking-tighter drop-shadow-md">NEED</h3>
                    <p class="text-base font-bold text-white/90 drop-shadow-sm tracking-wide uppercase mt-1">BLOOD</p>
                    
                    <div class="mt-3 bg-white/20 backdrop-blur-sm border border-white/30 px-4 py-1.5 rounded-full flex items-center gap-2">
                        <i class="fa-solid fa-kit-medical text-white text-xs"></i>
                        <span class="text-white text-xs font-bold uppercase tracking-wider">Request Now</span>
                    </div>
                </div>
            </a>
            
        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white/95 dark:bg-darkbg/95 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800 pt-4 pb-5 px-4 absolute bottom-0 w-full z-40">
            <div class="flex justify-around items-center gap-2">
                <!-- Home -->
                <a href="home.html" class="nav-item flex flex-col items-center gap-1.5 text-gray-400 dark:text-gray-500 hover:text-brand transition-colors group flex-1">
                    <i class="fa-solid fa-house text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold">Home</span>
                </a>

                <!-- Events -->
                <a href="event.html" class="nav-item flex flex-col items-center gap-1.5 text-gray-400 dark:text-gray-500 hover:text-brand transition-colors group flex-1">
                    <i class="fa-regular fa-calendar text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold">Events</span>
                </a>
                
                <!-- Center Diamond Button -->
                <div class="nav-diamond -translate-y-3">
                    <a href="Blood_bank.html" class="diamond-container">
                        <i class="fa-solid fa-droplet diamond-icon"></i>
                    </a>
                </div>

                <!-- Requests -->
                <a href="blood.html" class="nav-item flex flex-col items-center gap-1.5 text-gray-400 dark:text-gray-500 hover:text-brand transition-colors group flex-1">
                    <i class="fa-regular fa-file-lines text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold">About</span>
                </a>

                <!-- Profile -->
                <a href="profile.html" class="nav-item flex flex-col items-center gap-1.5 text-gray-400 dark:text-gray-500 hover:text-brand transition-colors group flex-1">
                    <i class="fa-solid fa-user text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;

        let isDarkMode = localStorage.getItem('theme') === 'dark';
        if (isDarkMode) {
            htmlElement.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Highlight active nav item based on current page
        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop() || 'home.html';
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (href === currentPage) {
                    item.classList.add('nav-item-active');
                } else {
                    item.classList.remove('nav-item-active');
                }
            });
        }

        setActiveNav();
    </script>
</body>
</html>
